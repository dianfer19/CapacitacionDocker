services:  # Define los contenedores que se van a ejecutar

  postgres16:  # Nombre del servicio (identificador dentro de la red)
    image: postgres:16  # Imagen base + versión específica

    container_name: postgres16_demo  # Nombre del contenedor

    restart: unless-stopped  # Reinicia automáticamente si falla              
              #no	No reinicia
              #always	Siempre reinicia
              #unless-stopped	Reinicia excepto si lo detienes
              #on-failure	Solo si falla
    environment:  # Variables de entorno para configurar el servicio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: demo_db

    ports:  # Mapeo de puertos (host:contenedor)
      - "5432:5432"


  postgres18:  # Nombre del servicio (identificador dentro de la red)
    image: postgres:18  # Imagen base + versión específica

    container_name: postgres18_demo  # Nombre del contenedor

    restart: unless-stopped  # Reinicia automáticamente si falla              
              #no	No reinicia
              #always	Siempre reinicia
              #unless-stopped	Reinicia excepto si lo detienes
              #on-failure	Solo si falla
    environment:  # Variables de entorno para configurar el servicio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: demo_db

    ports:  # Mapeo de puertos (host:contenedor)
      - "5431:5432"

  postgres-custom:  # Nombre del servicio (identificador dentro de la red)
    build: .
    image: db-custom:latest  # Imagen personalizada construida desde el Dockerfile
    container_name: postgres_custom_demo  # Nombre del contenedor
    restart: unless-stopped  # Reinicia automáticamente si falla              
              #no	No reinicia
              #always	Siempre reinicia
              #unless-stopped	Reinicia excepto si lo detienes
              #on-failure	Solo si falla
    environment:  # Variables de entorno para configurar el servicio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: demo_db

    ports:  # Mapeo de puertos (host:contenedor)
      - "5430:5432"